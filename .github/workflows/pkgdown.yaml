# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs on main
    concurrency:
      group: pkgdown-${{ (github.event_name != 'pull_request' && github.ref_name == 'main') || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: "release"
          extra-repositories: 'https://inla.r-inla-download.org/R/testing https://inlabru-org.r-universe.dev'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Upload website for deployment 🚀
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'devel' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    runs-on: ubuntu-latest
    needs: pkgdown
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'devel' }}
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'devel' }}
        uses: actions/deploy-pages@v5


